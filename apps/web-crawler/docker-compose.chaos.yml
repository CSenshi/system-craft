services:
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:latest
    ports:
      - '8474:8474' # Toxiproxy API
      - '4567:4567' # Proxy → LocalStack
    healthcheck:
      test: ['CMD', '/toxiproxy-cli', 'list']
      interval: 3s
      timeout: 5s
      retries: 10
    depends_on:
      localstack:
        condition: service_healthy

  localstack:
    image: localstack/localstack:latest
    environment:
      - SERVICES=s3,sqs,dynamodb
      - AWS_DEFAULT_REGION=eu-central-1
      - DEBUG=1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    # No host port binding — only Toxiproxy needs to reach LocalStack via Docker DNS.
    # This prevents port conflicts with the regular docker-compose.yml.
    expose:
      - '4566'
    volumes:
      - './docker/localstack/init-scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-aws.sh'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -sf http://localhost:4566/_localstack/health | grep -q "running"',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
