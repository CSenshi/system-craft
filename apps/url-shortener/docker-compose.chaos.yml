services:
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:latest
    ports:
      - '8474:8474' # Toxiproxy API
      - '6380:6380' # Proxy → Redis
      - '5433:5433' # Proxy → Postgres
    healthcheck:
      test: ['CMD', '/toxiproxy-cli', 'list']
      interval: 3s
      timeout: 5s
      retries: 10
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  redis:
    image: redis/redis-stack:latest
    # No host port binding — only Toxiproxy needs to reach Redis via Docker DNS.
    # This prevents port conflicts with the regular docker-compose.yml.
    expose:
      - '6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 5s
      retries: 10

  db:
    image: postgres:17-alpine
    # No host port binding — only Toxiproxy needs to reach Postgres via Docker DNS.
    expose:
      - '5432'
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: app
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d app']
      interval: 3s
      timeout: 5s
      retries: 10
